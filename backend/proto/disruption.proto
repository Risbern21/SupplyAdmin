syntax = "proto3";

package supplychain;

import "google/protobuf/timestamp.proto";

option go_package = "gen/pb";

message DisruptionRisk {
  string shipment_id = 1;
  string type = 2;
  string severity = 3;
  string description = 4;
  google.protobuf.Timestamp detected_at = 5;
}

message AnalyzeShipmentRequest {
  string shipment_id = 1;
}

message AnalyzeShipmentResponse {
  string shipment_id = 1;
  repeated DisruptionRisk risks = 2;
  bool rerouted = 3;
}

message ListDisruptionsRequest {
  optional string severity = 1;
}

message ListDisruptionsResponse {
  repeated DisruptionRisk disruptions = 1;
}

message WatchDisruptionsRequest {
  string owner_id = 1;
}

message WatchDisruptionsResponse {
  string shipment_id = 1;
  DisruptionRisk risk = 2;
  string suggested_action = 3;
  google.protobuf.Timestamp alert_time = 4;
}

service DisruptionService {
  rpc AnalyzeShipment(AnalyzeShipmentRequest) returns (AnalyzeShipmentResponse);
  rpc ListDisruptions(ListDisruptionsRequest) returns (ListDisruptionsResponse);
  rpc WatchDisruptions(WatchDisruptionsRequest) returns (stream WatchDisruptionsResponse);
}
