syntax = "proto3";

package supplychain;

option go_package = "gen/pb";

message RoutePoint {
  double lat = 1;
  double lng = 2;
  string label = 3;
  int32 sequence = 4;
}

message Route {
  string shipment_id = 1;
  repeated RoutePoint points = 2;
  double estimated_duration_minutes = 3;
  double distance_km = 4;
  string reason = 5;
  string traffic = 6;
  string weather = 7;
}

